version: '3.8'

services:
  # GoGaze Client Application - Production
  gogaze-client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_BASE_URL=${PROD_API_URL:-https://api.gogaze.com/api}
      - NEXT_PUBLIC_API_URL=${PROD_PUBLIC_API_URL:-https://api.gogaze.com/api}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - gogaze-production
    restart: unless-stopped
    healthcheck:
      # node is in the image; the alpine runner has no curl.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1  # t2.micro (1 vCPU, 1GB RAM) can only run 1 replica
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gogaze-prod.rule=Host(`gogaze.com`)"
      - "traefik.http.routers.gogaze-prod.tls=true"
      - "traefik.http.routers.gogaze-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.gogaze-prod.loadbalancer.server.port=3000"

  # Redis for production
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - gogaze-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Nginx for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - gogaze-client
    networks:
      - gogaze-production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Monitoring - Prometheus (lightweight, keep on t2.micro)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gogaze-production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # Monitoring - Grafana (optional on t2.micro, disable if RAM is tight)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - gogaze-production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    profiles:
      - monitoring  # Only start with: docker compose --profile monitoring up

  # NOTE: ELK Stack (Elasticsearch, Logstash, Kibana) removed.
  # Elasticsearch alone needs 2GB RAM — impossible on t2.micro (1GB total).
  # For log aggregation on t2.micro, use:
  #   - CloudWatch Logs (free tier: 5GB/month)
  #   - Or Loki + Promtail (uses ~50MB RAM vs Elasticsearch's 2GB)

volumes:
  redis_prod_data:
  prometheus_data:
  grafana_prod_data:

networks:
  gogaze-production:
    driver: bridge
