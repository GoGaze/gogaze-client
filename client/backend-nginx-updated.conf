upstream daphne {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name 13.233.206.39;

    # Global settings for large file uploads
    client_max_body_size 500M;
    client_body_timeout 600s;  # 10 minutes for large uploads
    client_body_buffer_size 1M;

    # Static files
    location /static/ {
        alias /home/ubuntu/server/goGaze_main/staticfiles/;
    }

    # Media files (if not using S3)
    location /media/ {
        alias /home/ubuntu/server/goGaze_main/media/;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Upload endpoint - specific configuration for large file uploads
    location /api/media/ {
        client_max_body_size 500M;
        client_body_timeout 600s;  # Increased to 10 minutes
        client_body_buffer_size 1M;  # Increased buffer
        
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for large file uploads (10 minutes)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;  # Increased to 10 minutes
        proxy_read_timeout 600s;  # Increased to 10 minutes
        
        # Disable buffering for large uploads
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Additional headers for large uploads
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }

    # API and Admin
    location / {
        proxy_pass http://daphne;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

